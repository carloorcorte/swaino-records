<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="circle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d6b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Decorative circle -->
  <circle cx="400" cy="360" r="260" fill="url(#circle)" opacity="0.5"/>
  <circle cx="400" cy="360" r="180" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="360" r="60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

  <!-- Horizontal line -->
  <line x1="80" y1="580" x2="720" y2="580" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

  <!-- Artist name -->
  <text x="400" y="630" font-family="Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="8" fill="#a1a1aa" text-anchor="middle">MARCO SWAINO</text>

  <!-- Title -->
  <text x="400" y="685" font-family="Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="2" fill="#ffffff" text-anchor="middle">NOTTE BASSA</text>

  <!-- Label -->
  <text x="400" y="740" font-family="Arial, sans-serif" font-size="13" font-weight="300" letter-spacing="5" fill="#52525b" text-anchor="middle">SWAINO RECORDS</text>
</svg>
